# 局部代价地图
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 20.0          # 20Hz 刷新，告别残留拖影
      publish_frequency: 10.0         # 对应提高可视化发布频率
      global_frame: odom              # 保持 odom 保证局部里程计平滑
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 6                        # 保持 5x5 米的开阔局部窗口
      height: 6
      resolution: 0.05    # 分辨率为5cm
      footprint: "[ [0.21, 0.195], [0.21, -0.195], [-0.21, -0.195], [-0.21, 0.195] ]"
      plugins: ["obstacle_layer", "inflation_layer"] # 彻底采用纯平面层接2D scan
      footprint_clearing_enabled: true    # 开启局部地图轮廓清理
      combination_method: 1
      always_send_full_costmap: True  # 开启全图发送，确保RViz显示同步无丢包
      
      # 纯平面障碍物层
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True  # 清除旧障碍物
          marking: True   # 标记新障碍物
          obstacle_range: 2.5         # 障碍物插入距离
          raytrace_range: 20.0        # 大幅放宽光线追踪距离，保证远处空旷时也能拉出长射线
          inf_is_valid: true          # 致命关键：必须将 inf 视为有效空旷数据触发清除

      # 膨胀层
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0  # 代价衰减速度因子，越小，机器离的越远
        inflation_radius: 0.55    # 膨胀半径，越大，机器人离的越远

# 全局代价地图
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0           # 全局5Hz
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      footprint: "[ [0.21, 0.195], [0.21, -0.195], [-0.21, -0.195], [-0.21, 0.195] ]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      footprint_clearing_enabled: true
      combination_method: 1
      always_send_full_costmap: True
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          obstacle_range: 2.5
          raytrace_range: 20.0        # 同步拉长全局射线清理距离
          inf_is_valid: true          # 补齐全局层面的幽灵残留清理
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

# 静态地图服务器配置
map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "map.yaml"         # 要加载的静态地图文件路径（后续通过Launch传入实际路径）

# 全局规划服务器
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0  # 全局规划器被期望的运行频率
    use_sim_time: False
    planner_plugins: ["GridBased"]    # 加载规划器插件
    
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner" # 使用最稳定经典的Navfn算法（支持A*和Dijkstra）
      tolerance: 0.5                  # 终点容忍距离，如果终点在障碍物内，允许规划到距离它0.5米的位置
      use_astar: false                # False表示使用 Dijkstra 算法；True表示使用 A* 算法
      allow_unknown: true             # 是否允许路径穿过未知区域

# 路径平滑服务器
smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["SimpleSmoother"]
    SimpleSmoother:
      plugin: "nav2_smoother::SimpleSmoother" # 基于数学曲线的简单平滑器
      tolerance: 1.0e-10              # 平滑迭代收敛容差
      max_its: 1000                   # 最大迭代次数
      do_refinement: True             # 是否在平滑后增加航点密度

# 恢复行为服务器配置
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw # 恢复行为所需的代价地图数据源
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"] # 注册行为插件
    
    spin: # 原地旋转行为配置
      plugin: "nav2_behaviors/Spin"
    backup: # 倒车行为配置
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading: # 沿当前朝向直行行为
      plugin: "nav2_behaviors/DriveOnHeading"
    wait: # 原地等待行为
      plugin: "nav2_behaviors/Wait"
      
    # 行为的具体参数调整
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0          # 行为执行前，预测碰撞的安全时间限制
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# 航点跟随器配置
waypoint_follower:
  ros__parameters:
    loop_rate: 20                     # 检查是否到达航点状态的频率
    stop_on_failure: false            # 如果前往某个航点失败，是否停止后续所有任务
    waypoint_task_executor_plugin: "wait_at_waypoint" # 到达航点后执行的任务
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      waypoint_pause_duration: 200    # 在每个航点暂停的毫秒数

# 速度平滑器配置
velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0         # 平滑计算频率
    scale_velocities: False           # 如果超出物理极限，是否等比例缩小XY速度以保持原本运动轨迹的弧度
    feedback: "OPEN_LOOP"             # "OPEN_LOOP" (使用最后发出的指令计算) 或 "CLOSED_LOOP" (通过odom话题读取底盘真实速度计算)
    max_velocity: [0.26, 0.0, 1.0]     # 这里的 vx 也必须同步放大
    min_velocity: [-0.26, 0.0, -1.0]  # 各维度的最小速度
    max_accel: [2.5, 0.0, 3.2]        # 各维度的最大加速度
    max_decel: [-2.5, -0.0, -3.2]      # 各维度的最大减速度（负数）
    odom_topic: "odom"                # 仅在 CLOSED_LOOP 时使用
    odom_duration: 0.1                # 用于缓冲里程计数据的时长