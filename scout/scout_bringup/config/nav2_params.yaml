# =====================================================================
# Nav2 完整配置文件 (Humble 版本)
# 包含：BT Navigator, Controller, Planner, Smoother, Behaviors, 
# Costmaps (Global & Local), Map Server, Waypoint Follower, Velocity Smoother
# =====================================================================

# 行为树导航配置
bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map                  # BT导航器所使用的全局坐标系
    robot_base_frame: base_link   # 机器人基座坐标系
    odom_topic: /odom                  # 里程计话题名称
    default_bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery.xml" # 默认加载的行为树XML文件
    # 加载BT所需要用到的各种动作和条件插件库


# 局部规划器
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0        # 控制器运行的频率（Hz），即向底盘发cmd_vel的频率
    min_x_velocity_threshold: 0.001   # X方向最小速度阈值（避免极小值导致电机抖动）
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3            # 允许控制器规划失败的时间（秒），超过此时间上报失败给BT
    progress_checker_plugin: "progress_checker" # 进度检查器插件，用于判断机器人是否“卡住”
    goal_checker_plugins: ["general_goal_checker"] # 目标到达检查器插件
    controller_plugins: ["FollowPath"] # 加载的控制器插件列表

    # 进度检查器配置
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5   # 机器人必须在这个时间内移动的半径（米）
      movement_time_allowance: 10.0   # 允许不移动的最长时间（秒），10秒内没移出0.5米算作卡住

    # 目标到达检查器配置
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.035         # 到达目标的XY坐标允许误差（米）
      yaw_goal_tolerance: 0.1745       # 10度 到达目标的角度允许误差（弧度）

    # 局部控制器(DWB)配置
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: -0.26                  # 最小线速度（不支持倒车设为0，支持可设为负）
      min_vel_y: 0.0                  # Y方向速度（差速车为0）
      max_vel_x: 0.26                  # 最大X线速度（m/s）
      max_vel_y: 0.0
      max_vel_theta: 1.0              # 最大角速度（rad/s）
      min_speed_xy: 0.0               # XY平面的最小合速度
      max_speed_xy: 0.26               # 必须与 max_vel_x 同步放大
      min_speed_theta: 0.0
      acc_lim_x: 2.5                  # X方向最大加速度 (m/s^2)
      acc_lim_y: 2.5 
      acc_lim_theta: 3.2              # 最大角加速度 (rad/s^2)
      decel_lim_x: -2.5               # 最大减速度
      decel_lim_y: -2.5 
      decel_lim_theta: -3.2
      vx_samples: 20                  # 前向速度采样数量
      vy_samples: 1                   # Y向速度采样数量（差速车设1即可）
      vtheta_samples: 20              # 旋转速度采样数量
      sim_time: 1.7                   # 预测未来轨迹的时长（秒）
      # DWB评价函数（Critics），用于给采样出的轨迹打分，分数越低越好
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 10.0         # 避障得分权重，数值越大越远离障碍物
      PathAlign.scale: 32.0           # 轨迹与全局路径对齐的权重
      GoalAlign.scale: 24.0           # 机器人朝向对准目标的权重
      PathDist.scale: 32.0            # 轨迹贴合全局路径的权重
      GoalDist.scale: 24.0            # 轨迹接近目标的权重
      RotateToGoal.scale: 32.0        # 到达目标点附近时允许原地旋转对齐的权重

